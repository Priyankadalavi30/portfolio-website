version: 0.2

phases:
  install:
    commands:
      - echo "No dependencies to install for static HTML project"

  build:
    commands:
      - echo "Build started on `date`"
      - echo "Preparing files for deployment"

  post_build:
    commands:
      - echo "Deploying files to S3 bucket..."
      - aws s3 sync . s3://my-portfolio-site --delete

artifacts:
  files:
    - '**/*'
